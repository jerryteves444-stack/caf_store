{% extends "base.html" %}
{% block title %}Supplier Form{% endblock %}
{% block content %}
<h3 class="mb-4">{% if object %}Edit Supplier{% else %}Add Supplier{% endif %}</h3>
<div class="card" style="max-width:560px;"><div class="card-body">
<form method="post">{% csrf_token %}
{% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}
{% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}</div>{% endfor %}
<button class="btn btn-primary" type="submit">Save</button>
<a href="{% url 'suppliers:supplier_list' %}" class="btn btn-outline-secondary">Cancel</a>
</form></div></div>
{% endblock %}
