{% extends "base.html" %}
{% block title %}Markup Calculator{% endblock %}
{% block content %}
<h3 class="mb-4">Automatic Markup Calculator</h3>
<div class="card" style="max-width:480px;"><div class="card-body">
<form method="post">{% csrf_token %}
{% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}</div>{% endfor %}
<button class="btn btn-primary" type="submit">Calculate</button>
</form>
{% if result %}<div class="alert alert-success mt-3">Suggested Selling Price: <strong>₱{{ result }}</strong></div>{% endif %}
</div></div>
{% endblock %}
