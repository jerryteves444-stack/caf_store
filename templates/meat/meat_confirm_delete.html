{% extends "base.html" %}
{% block title %}Delete Meat Batch{% endblock %}
{% block content %}
<h3 class="text-danger mb-4">Delete Meat Batch</h3>
<div class="card" style="max-width:480px;"><div class="card-body">
<p>Are you sure you want to permanently delete <strong>{{ meat }}</strong>?</p>
<form method="post">{% csrf_token %}
<button class="btn btn-danger" type="submit">Yes, Delete Permanently</button>
<a href="{% url 'meat:meat_list' %}" class="btn btn-outline-secondary">Cancel</a>
</form>
</div></div>
{% endblock %}
