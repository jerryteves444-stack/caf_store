{% extends "base.html" %}
{% block title %}Expiring Products{% endblock %}
{% block content %}
<h3 class="mb-4">Expiring Soon</h3>
<div class="card">
<table class="table mb-0">
    <thead><tr><th>Code</th><th>Name</th><th>Qty</th><th>Expiration Date</th></tr></thead>
    <tbody>
    {% for p in products %}
    <tr><td>{{ p.product_code }}</td><td>{{ p.name }}</td><td>{{ p.quantity }}</td><td><span class="badge bg-info text-dark">{{ p.expiration_date }}</span></td></tr>
    {% empty %}<tr><td colspan="4" class="text-center text-muted py-3">Nothing expiring soon.</td></tr>{% endfor %}
    </tbody>
</table>
</div>
{% endblock %}
