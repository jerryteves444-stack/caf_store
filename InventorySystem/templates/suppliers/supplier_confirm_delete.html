{% extends "base.html" %}
{% block title %}Delete Supplier{% endblock %}
{% block content %}
<h3 class="text-danger mb-4">Delete Supplier</h3>
<div class="card" style="max-width:480px;"><div class="card-body">
<p>Are you sure you want to delete <strong>{{ object.company_name }}</strong>?</p>
<form method="post">{% csrf_token %}
<button class="btn btn-danger" type="submit">Yes, Delete</button>
<a href="{% url 'suppliers:supplier_list' %}" class="btn btn-outline-secondary">Cancel</a>
</form></div></div>
{% endblock %}
