{% extends "base.html" %}
{% block title %}Delete User{% endblock %}
{% block content %}
<h3 class="mb-4 text-danger">Delete User</h3>
<div class="card" style="max-width: 480px;">
    <div class="card-body">
        <p>Are you sure you want to permanently delete <strong>{{ object.username }}</strong>? This cannot be undone.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete Permanently</button>
            <a href="{% url 'accounts:user_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
